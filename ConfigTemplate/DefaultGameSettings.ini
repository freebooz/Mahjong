;==============================================================================
; MahjongGame 配置模板
; MahjongGameSettings.ini
;
; 使用方法:
;   1. 复制此文件到 Config/ 目录
;   2. 重命名为 DefaultGameSettings.ini
;   3. 修改其中的值以匹配你的服务器配置
;
; 重要: 不要将此文件提交到版本控制系统!
;==============================================================================

[/Script/MahjongGame.MahjongGameSettings]
;--------------------------------------------------------------------------
; 服务器配置
;--------------------------------------------------------------------------
; 游戏服务器地址
ServerURL=https://api.mahjonggame.com

; WebSocket 服务器地址
WebSocketURL=wss://ws.mahjonggame.com

; Redis 监控服务器
RedisHost=redis.mahjonggame.com
RedisPort=6379
RedisPassword=

;--------------------------------------------------------------------------
; 微信登录配置
;--------------------------------------------------------------------------
; 微信 AppID（在微信开放平台获取）
WeChatAppID=your_wechat_appid

; 微信 AppSecret（在微信开放平台获取）
WeChatAppSecret=your_wechat_appsecret

; 微信授权回调地址
WeChatCallbackURL=https://api.mahjonggame.com/auth/wechat/callback

;--------------------------------------------------------------------------
; 游戏房间配置
;--------------------------------------------------------------------------
; 默认房间人数
DefaultRoomCapacity=4

; 默认游戏局数
DefaultGameRounds=8

; 最大房间人数
MaxRoomCapacity=4

; 最小房间人数
MinRoomCapacity=2

;--------------------------------------------------------------------------
; 网络配置
;--------------------------------------------------------------------------
; Socket 连接超时（秒）
SocketTimeout=30

; 最大重连次数
MaxReconnectAttempts=5

; 重连间隔（秒）
ReconnectInterval=3

; 心跳间隔（秒）
HeartbeatInterval=10

;--------------------------------------------------------------------------
; 性能配置
;--------------------------------------------------------------------------
; 启用音效预加载
bPreloadSounds=true

; 最大缓存音效数量
MaxCachedSounds=20

; 启用性能监控
bEnablePerformanceMonitor=false

; 帧率限制（0 = 无限制）
TargetFrameRate=60

;--------------------------------------------------------------------------
; 日志配置
;--------------------------------------------------------------------------
; 日志级别 (Verbose, Log, Warning, Error)
LogLevel=Log

; 启用网络调试日志
bEnableNetworkDebugLog=false

; 启用性能调试日志
bEnablePerformanceDebugLog=false
